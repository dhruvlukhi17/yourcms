# ============================================================
# netlify.toml — Netlify build & routing configuration
# ============================================================

[build]
  publish = "."     # Root of the repo is the published site

# Security headers for the admin panel
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options   = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection  = "1; mode=block"
    Referrer-Policy   = "strict-origin-when-cross-origin"

# General cache headers for static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
